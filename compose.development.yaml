services:
  web:
    environment:
      # Injects the hot_reload directive and file-watching worker config into the
      # Caddyfile at runtime. Not present in production (this file is never loaded there).
      # See docs/adr/009-hot-reloading.md#decision-compose
      CADDY_PHP_SERVER_EXTRA_DIRECTIVES: |
        hot_reload
        worker {
          file /app/public/index.php
          watch /app/src/**/*.php
          watch /app/public/**/*.php
          watch /app/templates/**/*.php
        }
