[opcache]
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
; Timestamp validation is OFF in production: no stat() calls per request.
; The development stage overrides this to 1 via zzz-opcache-dev.ini.
; See HOT-010
opcache.validate_timestamps=0
opcache.save_comments=0
opcache.enable_file_override=1
; Preload is active in production. Disabled in dev because hot reload requires fresh
; bytecode on every worker restart. See HOT-001, HOT-010
opcache.preload=/app/preload.php
opcache.preload_user=root
opcache.jit=tracing
opcache.jit_buffer_size=64M
