; Development OPcache overrides — installed by the development Dockerfile stage
; as zzz-opcache-dev.ini so it loads after opcache.ini. Never loaded in production.
; See HOT-010

[opcache]
; Re-enable file stat checks so OPcache does not serve stale bytecode after a source edit.
; Production keeps this at 0 for throughput. See HOT-001, HOT-010
opcache.validate_timestamps=1
; Check on every request rather than on a timer, so changes take effect immediately.
opcache.revalidate_freq=0
; Preloading is disabled: it would lock compiled bytecode at worker startup,
; defeating the timestamp validation above. See HOT-001
opcache.preload=
opcache.jit=tracing
opcache.jit_buffer_size=64M
