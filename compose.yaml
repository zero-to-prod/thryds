services:
  web:
    build:
      context: .
      target: ${APP_ENV:-development}
    ports:
      - "${APP_PORT:-80}:${APP_PORT:-80}"
    environment:
      APP_ENV: ${APP_ENV:-development}
      SERVER_NAME: ":${APP_PORT:-80}"
      CADDY_SERVER_EXTRA_DIRECTIVES: |
        mercure {
          transport local
          anonymous
        }
      CADDY_PHP_SERVER_EXTRA_DIRECTIVES: |
        hot_reload
        worker {
          file /app/public/index.php
          watch /app/src/**/*.php
          watch /app/public/**/*.php
          watch /app/templates/**/*.php
        }
      CADDY_GLOBAL_OPTIONS: >-
        log {
          output file /app/logs/frankenphp/caddy.log
          format json {
            time_format wall
          }
        }
    volumes:
      - ./:/app
      - caddy_data:/data
      - caddy_config:/config

  dev:
    image: node:22-alpine
    working_dir: /app
    environment:
      APP_ENV: ${APP_ENV:-development}
    command: sh -c 'if [ "$$APP_ENV" != "development" ]; then exit 0; fi && npm install && npm run dev'
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules

  composer:
    profiles:
      - tools
    build:
      context: .
      target: composer
    volumes:
      - ./:/app

volumes:
  caddy_data:
  caddy_config:
  node_modules:
