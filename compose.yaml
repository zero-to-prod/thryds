services:
  web:
    build:
      context: .
      target: ${APP_ENV:-development}
    ports:
      - "${APP_PORT:-80}:${APP_PORT:-80}"
    environment:
      APP_ENV: ${APP_ENV:-development}
      SERVER_NAME: ":${APP_PORT:-80}"
      CADDY_SERVER_EXTRA_DIRECTIVES: |
        mercure {
          transport local
          anonymous
        }
      CADDY_PHP_SERVER_EXTRA_DIRECTIVES: ""
      CADDY_GLOBAL_OPTIONS: >-
        log {
          output file /app/logs/frankenphp/caddy.log
          format json {
            time_format wall
          }
        }
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-thryds}
      DB_USERNAME: ${DB_USERNAME:-thryds}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    volumes:
      - ./:/app
      - /app/public/build
      - caddy_data:/data
      - caddy_config:/config

  db:
    image: mysql:9.2
    command: --port=${DB_PORT:-3306}
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-thryds}
      MYSQL_USER: ${DB_USERNAME:-thryds}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:${DB_PORT:-3306}"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-P", "${DB_PORT:-3306}", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  dev:
    image: node:22-alpine
    working_dir: /app
    environment:
      APP_ENV: ${APP_ENV:-development}
    command: sh -c 'if [ "$$APP_ENV" != "development" ]; then exit 0; fi && npm install && npm run dev'
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules

  composer:
    profiles:
      - tools
    build:
      context: .
      target: composer
    volumes:
      - ./:/app

volumes:
  caddy_data:
  caddy_config:
  node_modules:
  db_data:
