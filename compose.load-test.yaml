services:
  web:
    build:
      context: .
      target: production
    environment:
      APP_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  k6:
    image: grafana/k6
    command: run --out json=/logs/k6/results.json /scripts/load-test.js
    volumes:
      - ./tests/load:/scripts
      - ./logs/k6:/logs/k6
    depends_on:
      web:
        condition: service_healthy
